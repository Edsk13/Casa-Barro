<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Casa Barro</title>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- Inyección del menú -->
    <div id="navbar-container"></div>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Crear Cuenta</h2>
            <p>Regístrate para guardar tus favoritos y realizar pedidos.</p>
            
            <form class="auth-form" id="form-registro">
                <input type="text" id="reg-nombre" placeholder="Nombre completo" required>
                <input type="email" id="reg-correo" placeholder="Correo electrónico" required>
                <input type="password" id="reg-pass" placeholder="Contraseña" required>
                <button type="submit" class="auth-btn">Registrarme</button>
            </form>
            
            <div class="auth-links">
                ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </div>
    </main>

    <!-- Inyección del pie de página -->
    <div id="footer-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
