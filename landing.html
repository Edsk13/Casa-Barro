<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Café Gratis! | Casa Barro</title>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <main class="hero" style="height: 100vh; padding: 20px;">
        <div class="logo" style="margin-bottom: 2rem;">
            <span class="logo-casa" style="color: white;">Casa</span>
            <span class="logo-barro" style="color: white;">BARRO</span>
        </div>
        
        <div class="badges">
            <span class="badge">¡Promo Exclusiva!</span>
        </div>
        
        <h1 style="font-size: 3rem; margin-bottom: 0.5rem;">¡Únete al club!</h1>
        <p style="margin-bottom: 2rem;">Regístrate hoy y obtén un <strong>café americano gratis</strong> en tu próxima visita a nuestra sucursal.</p>
        <form id="form-landing" class="auth-form landing-form">
            <input type="text" id="landing-nombre" placeholder="Tu nombre" required>
            <input type="email" id="landing-correo" placeholder="Tu correo" required>
            <!-- Usamos el botón primario del index -->
            <button type="submit" class="btn-primary" style="width: 100%; border-radius: 8px;">Quiero mi café gratis</button>
        </form>
        
        <p style="font-size: 0.85rem; opacity: 0.8; margin-top: 15px; text-shadow: none;">*No enviaremos spam, solo promociones deliciosas.</p>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
