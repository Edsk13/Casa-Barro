<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Casa Barro</title>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div id="navbar-container"></div>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Bienvenido</h2>
            <p>Ingresa tus datos para continuar.</p>
            
            <form class="auth-form" id="form-login">
                <input type="email" id="login-correo" placeholder="Correo electrónico" required>
                <input type="password" id="login-pass" placeholder="Contraseña" required>

                <div class="auth-checkbox">
                    <input type="checkbox" id="login-recordar">
                    <label for="login-recordar">Recordar contraseña</label>
                </div>

                <button type="submit" class="auth-btn">Entrar</button>
            </form>
            
            <div class="auth-links">
                <p style="margin-bottom: 10px;">¿Aún no tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
                <a href="#" id="btn-recuperar">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
